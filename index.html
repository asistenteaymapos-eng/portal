<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EcoKaizen · Portal Contable</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--ink:#03060f;--s1:#080f22;--s2:#0c1530;--s3:#10203f;--b1:#182f5a;--b2:#1f3d77;--txt:#ddeaff;--dim:#3d5585;--muted:#6080b0;--blue:#4a90ff;--cyan:#00e5ff;--green:#00ffb3;--red:#ff2d55;--amber:#ffcc00;--gold:#ffd700;--wa:#25D366;--wa2:#128C7E;}
html{scroll-behavior:smooth}
body{background:var(--ink);font-family:'Outfit',sans-serif;color:var(--txt);min-height:100vh;overflow-x:hidden;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.6;}
#splash{position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.9s ease, visibility 0.9s;}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.sp-ring{width:70px;height:70px;border:3px solid var(--b2);border-top-color:var(--cyan);border-right-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px;}
@keyframes spin{to{transform:rotate(360deg)}}
.sp-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;background:linear-gradient(135deg,#fff 30%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 0 60px;}
.header{padding:20px 20px 0;animation:riseIn 0.7s 0.2s ease both;}
.header-inner{background:linear-gradient(135deg,var(--s2) 0%,rgba(10,20,50,0.95) 100%);border:1px solid var(--b1);border-radius:20px;padding:20px;position:relative;overflow:hidden;backdrop-filter:blur(20px);}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.h-brand{display:flex;align-items:center;gap:12px}
.h-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:#fff;box-shadow:0 0 20px rgba(74,144,255,0.4);flex-shrink:0;}
.h-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.h-saldo-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.h-saldo-amt{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:1px;line-height:1;color:#fff;text-shadow:0 0 30px rgba(255,45,85,0.3);margin-bottom:4px;}
.h-saldo-cur{font-size:28px;color:var(--muted);margin-right:4px}
.prog-wrap{background:rgba(255,255,255,0.04);border-radius:6px;height:5px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--red),var(--amber));box-shadow:0 0 8px rgba(255,45,85,0.5);transition:width 1.5s cubic-bezier(0.4,0,0.2,1);}
.kpi-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px 0;animation:riseIn 0.7s 0.3s ease both;}
.kc{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:14px;}
.kc-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;margin-top:4px;}
.sec{padding:16px 20px 0;animation:riseIn 0.7s ease both}
.ledger-card{background:var(--s2);border:1px solid var(--b1);border-radius:16px;overflow:hidden;}
.lr{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.03);}
.lr-right{text-align:right;flex-shrink:0}
.amt-red{color:var(--red)}
.totals-block{background:linear-gradient(135deg,rgba(74,144,255,0.06),rgba(0,229,255,0.03));border:1px solid rgba(74,144,255,0.15);border-radius:14px;padding:16px;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border-radius:13px;background:linear-gradient(135deg,var(--wa),var(--wa2));color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;border:none;cursor:pointer;text-decoration:none;}
@keyframes riseIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="splash"><div class="sp-ring"></div><div class="sp-logo">ECOKAIZEN</div></div>
<div class="app" id="main-app">
  <div class="header"><div class="header-inner"><div class="h-top"><div class="h-brand"><div class="h-logo">EK</div><div><div class="h-name">ECOKAIZEN</div></div></div></div><div class="h-saldo-label">Saldo neto exigible</div><div class="h-saldo-amt" id="hero-neto"><span class="h-saldo-cur">S/</span><span id="hero-neto-val">9,300.00</span></div></div></div>
  <div class="kpi-strip"><div class="kc"><div class="kc-lbl">Almacén</div><div class="kc-val" id="kpi-alm">8,100</div></div><div class="kc"><div class="kc-lbl">Depto</div><div class="kc-val" id="kpi-dep">1,200</div></div></div>
  <div class="sec"><div class="ledger-card" id="cart-wrapper"></div></div>
</div>
<script>
// ── CONFIG ──
const WA_NUM     = '51949546919';
const SALT       = 'EK_SALT_2026';
const BASE_ALM   = 8100; // <--- CORREGIDO
const BASE_DEP   = 1200; // <--- CORREGIDO
const MAX_DEUDA  = 12000;

function engine(){
  const abono  = parseFloat(document.getElementById('f-abono')?.value)||0;
  const bruto  = BASE_ALM + BASE_DEP;
  const neto   = Math.max(0, bruto - abono);
  document.getElementById('hero-neto-val').innerText = neto.toLocaleString('es-PE',{minimumFractionDigits:2});
  document.getElementById('kpi-alm').innerText = BASE_ALM.toLocaleString('es-PE');
  document.getElementById('kpi-dep').innerText = BASE_DEP.toLocaleString('es-PE');
}
window.onload=()=>{ engine(); setTimeout(()=>{document.getElementById('splash').classList.add('out')},1000); };
</script>
</body>
</html>
